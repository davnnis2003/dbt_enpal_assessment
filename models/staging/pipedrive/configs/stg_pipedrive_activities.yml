version: 2

models:
  - name: stg_pipedrive_activities
    description: Staged activity records from the raw Pipedrive source.
    columns:
      - name: activity_id
        description: The primary key of the activity.
        tests:
          - unique
          - not_null
      - name: activity_type_category
        description: The type/category of activity (e.g. meeting, follow_up).
      - name: assigned_user_id
        description: The foreign key ID of the user assigned to this activity.
      - name: deal_id
        description: The foreign key ID of the deal associated with this activity.
      - name: is_done
        description: Boolean indicating whether the activity is completed.
      - name: due_at_utc
        description: The date and time when the activity is due in UTC timezone.
      - name: due_at_berlin
        description: The date and time when the activity is due converted to Europe/Berlin timezone.
